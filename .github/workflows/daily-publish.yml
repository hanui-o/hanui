name: Daily Blog Publish

# 매일 아침 예약 큐(apps/docs/blog-queue/)를 훑어, 발행일이 된 글을 content/blog로
# 옮기고 커밋·푸시한다. 푸시되면 Vercel이 자동 배포 → 글이 hanui.io에 등장.
# 재고(남은 예약글)가 부족하면 GitHub 이슈로 알린다.

on:
  schedule:
    - cron: '0 23 * * *' # 매일 23:00 UTC = 08:00 KST (다음날 아침)
  workflow_dispatch: {} # 수동 실행(테스트)용

permissions:
  contents: write # 발행 커밋 푸시
  issues: write # 재고 부족 알림 이슈

concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 발행 대상 선별 및 이동
        id: publish
        run: node scripts/publish-due-posts.mjs

      - name: 커밋 & 푸시
        if: steps.publish.outputs.published_count != '0'
        env:
          COUNT: ${{ steps.publish.outputs.published_count }}
          TITLES: ${{ steps.publish.outputs.published_titles }}
        run: |
          git config user.name "hanui-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "publish: 예약 글 ${COUNT}편 발행 — ${TITLES}"
          git push

      - name: 재고 부족 알림 이슈
        if: steps.publish.outputs.low_stock == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REMAINING: ${{ steps.publish.outputs.remaining }}
        run: |
          EXISTING=$(gh issue list --state open --label "blog-restock" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "이미 열린 재고 알림 이슈가 있어 생략."
            exit 0
          fi
          gh label create "blog-restock" --color FBCA04 --description "블로그 예약글 재고 알림" 2>/dev/null || true
          gh issue create \
            --title "📝 블로그 예약글 재고 부족 (남은 ${REMAINING}편)" \
            --label "blog-restock" \
            --body "예약 큐(apps/docs/blog-queue/)에 남은 글이 ${REMAINING}편이에요. 시간 날 때 글을 더 써서 큐에 쟁여두면(프론트매터 date를 미래 발행일로) 발행일에 자동으로 올라갑니다. 자세히는 apps/docs/blog-queue/README.md 참고. 재고를 채우면 이 이슈를 닫아주세요."
