name: Daily Blog Publish

# 매일 아침 예약 큐(apps/docs/blog-queue/)를 훑어, 발행일이 된 글을 content/blog로
# 옮기고 커밋·푸시한다. 푸시되면 Vercel이 자동 배포 → 글이 hanui.io에 등장.
# 재고(남은 예약글)가 부족하면 GitHub 이슈로 알린다.

on:
  schedule:
    - cron: '10 0 * * *' # 매일 00:10 UTC = 09:10 KST
  workflow_dispatch: {} # 수동 실행(테스트)용

permissions:
  contents: write # 발행 커밋 푸시
  issues: write # 재고 부족 알림 이슈

concurrency:
  group: daily-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 발행 대상 선별 및 이동
        id: publish
        run: node scripts/publish-due-posts.mjs

      - name: 커밋 & 푸시
        if: steps.publish.outputs.published_count != '0'
        run: |
          git config user.name "hanui-bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "publish: 예약 글 ${{ steps.publish.outputs.published_count }}편 발행 — ${{ steps.publish.outputs.published_titles }}"
          git push

      - name: 재고 부족 알림 이슈
        if: steps.publish.outputs.low_stock == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REMAINING="${{ steps.publish.outputs.remaining }}"
          TITLE="📝 블로그 예약글 재고 부족 (남은 ${REMAINING}편)"
          # 이미 열린 동일 알림 이슈가 있으면 중복 생성하지 않음
          EXISTING=$(gh issue list --state open --label "blog-restock" --json number --jq 'length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "이미 열린 재고 알림 이슈가 있어 생략."
            exit 0
          fi
          gh label create "blog-restock" --color FBCA04 --description "블로그 예약글 재고 알림" 2>/dev/null || true
          gh issue create \
            --title "$TITLE" \
            --label "blog-restock" \
            --body "$(cat <<'EOF'
예약 큐(`apps/docs/blog-queue/`)에 남은 글이 부족해요.

시간 날 때 글을 더 써서 큐에 쟁여두면, 발행일에 맞춰 자동으로 올라갑니다.

**쟁여두는 법**
1. `apps/docs/blog-queue/[slug].mdx` 로 글 작성 (프론트매터 `date`에 원하는 **발행일**을 미래 날짜로)
2. 커밋·푸시
3. 끝 — 매일 아침 워크플로우가 발행일이 된 글을 자동 발행

재고가 다시 채워지면 이 이슈는 닫아주세요.
EOF
)"
